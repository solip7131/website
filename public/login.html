<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 천재쀼 가계부</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
  background: linear-gradient(135deg, #1A3FA8 0%, #2D5BE3 50%, #5A8FE8 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.card {
  background: white; border-radius: 20px;
  padding: 48px 40px; width: 100%; max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}
.logo { text-align: center; margin-bottom: 32px; }
.logo h1 { font-size: 28px; font-weight: 800; color: #1F2937; margin-bottom: 6px; }
.logo p { font-size: 14px; color: #6B7280; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input {
  width: 100%; padding: 13px 16px; border: 2px solid #E5E7EB;
  border-radius: 12px; font-size: 14px; outline: none;
  transition: border 0.2s, box-shadow 0.2s;
}
.form-group input:focus { border-color: #3B72D9; box-shadow: 0 0 0 4px rgba(59,114,217,0.12); }
.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #2D5BE3, #5A8FE8);
  color: white; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,91,227,0.4); }
.btn:active { transform: translateY(0); }
.divider { text-align: center; margin: 20px 0; color: #9CA3AF; font-size: 13px; position: relative; }
.divider::before, .divider::after {
  content: ''; position: absolute; top: 50%; width: 40%; height: 1px;
  background: #E5E7EB;
}
.divider::before { left: 0; }
.divider::after { right: 0; }
.link-btn {
  width: 100%; padding: 13px; border: 2px solid #E5E7EB; border-radius: 12px;
  background: white; color: #374151; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.link-btn:hover { border-color: #3B72D9; color: #3B72D9; background: #F0F4FF; }
.error-msg { background: #FFF0F0; border: 1px solid #FFCCCC; color: #E53935; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; }
.error-msg.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🏠 천재쀼 가계부</h1>
    <p>로그인하여 가계부를 관리하세요</p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <form id="login-form">
    <div class="form-group">
      <label>아이디</label>
      <input type="text" id="username" placeholder="아이디를 입력하세요" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">로그인</button>
  </form>

  <div class="divider">또는</div>

  <button class="link-btn" onclick="location.href='/signup'">회원가입 신청</button>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();

  if (data.success) {
    window.location.href = data.redirect;
  } else {
    errEl.textContent = data.message;
    errEl.classList.add('show');
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지 - 천재쀼 가계부</title>
<style>
:root {
  --blue: #3B72D9; --blue2: #5A8FE8; --blue-light: #E8F0FD;
  --green: #27AE60; --green-light: #E9F7EF;
  --red: #E53935; --red-light: #FFEBEE;
  --orange: #F57C00; --orange-light: #FFF3E0;
  --gray: #6B7280; --gray-light: #F3F4F6; --border: #E5E7EB;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif; background: #F0F4FA; color: #1F2937; font-size: 14px; }

header {
  background: linear-gradient(135deg, #1A3FA8 0%, #2D5BE3 100%);
  color: white; padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 20px rgba(45,91,227,0.4);
  position: sticky; top: 0; z-index: 100; height: 60px;
}
header h1 { font-size: 18px; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 14px; }
.header-right span { font-size: 13px; opacity: 0.85; }
.btn-logout {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: white; padding: 6px 14px; border-radius: 8px; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: all .2s; text-decoration: none;
}
.btn-logout:hover { background: rgba(255,255,255,0.28); }

.content { max-width: 900px; margin: 0 auto; padding: 32px 18px; }

.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
@media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }
.stat-card {
  background: white; border-radius: var(--radius); padding: 22px 20px;
  box-shadow: var(--shadow); text-align: center;
}
.stat-card .num { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
.stat-card .label { font-size: 13px; color: var(--gray); font-weight: 500; }
.stat-card.pending .num  { color: var(--orange); }
.stat-card.approved .num { color: var(--green); }
.stat-card.rejected .num { color: var(--red); }

.tabs { display: flex; gap: 0; background: white; border-radius: 12px; padding: 6px; box-shadow: var(--shadow); margin-bottom: 20px; }
.tab-btn {
  flex: 1; padding: 10px; border: none; background: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; color: var(--gray);
}
.tab-btn.active { background: linear-gradient(135deg, var(--blue), var(--blue2)); color: white; box-shadow: 0 2px 8px rgba(59,114,217,0.3); }
.tab-btn:hover:not(.active) { background: var(--gray-light); color: #374151; }

.user-list { display: flex; flex-direction: column; gap: 12px; }
.user-card {
  background: white; border-radius: var(--radius); padding: 18px 20px;
  box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px;
  transition: box-shadow .2s;
}
.user-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.avatar {
  width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--blue2));
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 18px; font-weight: 700; flex-shrink: 0;
}
.user-info { flex: 1; }
.user-info .name { font-size: 15px; font-weight: 700; color: #1F2937; }
.user-info .username { font-size: 12px; color: var(--gray); margin-top: 2px; }
.user-info .date { font-size: 11px; color: #9CA3AF; margin-top: 3px; }
.status-badge {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
}
.status-badge.pending  { background: var(--orange-light); color: var(--orange); }
.status-badge.approved { background: var(--green-light); color: var(--green); }
.status-badge.rejected { background: var(--red-light); color: var(--red); }
.actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn-approve {
  padding: 8px 16px; border: none; border-radius: 8px;
  background: linear-gradient(135deg, var(--green), #2ECC71);
  color: white; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s;
}
.btn-approve:hover { box-shadow: 0 4px 12px rgba(39,174,96,0.4); transform: translateY(-1px); }
.btn-reject {
  padding: 8px 16px; border: none; border-radius: 8px;
  background: linear-gradient(135deg, var(--red), #EF5350);
  color: white; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s;
}
.btn-reject:hover { box-shadow: 0 4px 12px rgba(229,57,53,0.4); transform: translateY(-1px); }
.btn-delete {
  padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px;
  background: white; color: var(--gray); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-delete:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

.empty-state {
  text-align: center; padding: 48px 20px; color: var(--gray);
  background: white; border-radius: var(--radius); box-shadow: var(--shadow);
}
.empty-state .emoji { font-size: 44px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

.toast {
  position: fixed; bottom: 28px; right: 28px; background: #1F2937;
  color: white; padding: 13px 22px; border-radius: 10px; font-size: 13px;
  font-weight: 500; opacity: 0; transition: all .3s; pointer-events: none; z-index: 9999; transform: translateY(8px);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── 공지사항 관리 ── */
.notice-form {
  background: #F8FAFF; border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 22px; margin-bottom: 24px;
}
.notice-form h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #374151; }
.notice-form input, .notice-form textarea {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px 14px; font-size: 13px; font-family: inherit; outline: none;
  transition: border .2s, box-shadow .2s; background: white; margin-bottom: 10px;
}
.notice-form input:focus, .notice-form textarea:focus {
  border-color: var(--blue2); box-shadow: 0 0 0 3px rgba(90,143,232,0.15);
}
.notice-form textarea { min-height: 100px; resize: vertical; }
.notice-card {
  background: white; border-radius: var(--radius); padding: 18px 20px;
  box-shadow: var(--shadow); margin-bottom: 12px; transition: box-shadow .2s;
}
.notice-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.notice-card-title { font-size: 15px; font-weight: 700; color: #1F2937; margin-bottom: 6px; }
.notice-card-content {
  font-size: 13px; color: #4B5563; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
  background: var(--gray-light); border-radius: 8px; padding: 10px 14px; margin-bottom: 10px;
}
.notice-card-meta { font-size: 11px; color: var(--gray); margin-bottom: 12px; }
.notice-card .actions { display: flex; gap: 8px; }
.btn-edit-notice {
  padding: 7px 16px; border: none; border-radius: 8px;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  color: white; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s;
}
.btn-edit-notice:hover { box-shadow: 0 4px 12px rgba(59,114,217,0.4); transform: translateY(-1px); }
.btn-del-notice {
  padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
  background: white; color: var(--gray); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-del-notice:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
.btn-submit-notice {
  padding: 11px 26px; border: none; border-radius: 10px; cursor: pointer;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  color: white; font-size: 13px; font-weight: 700; transition: all .2s;
}
.btn-submit-notice:hover { box-shadow: 0 4px 12px rgba(59,114,217,0.35); transform: translateY(-1px); }
.btn-cancel-edit {
  padding: 11px 20px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer;
  background: white; color: var(--gray); font-size: 13px; font-weight: 600; transition: all .2s;
}
.btn-cancel-edit:hover { background: var(--gray-light); }
</style>
</head>
<body>

<header>
  <h1>🔑 관리자 페이지</h1>
  <div class="header-right">
    <span>관리자</span>
    <a href="/logout" class="btn-logout">로그아웃</a>
  </div>
</header>

<div class="content">
  <div class="stats-grid">
    <div class="stat-card pending">
      <div class="num" id="stat-pending">—</div>
      <div class="label">⏳ 승인 대기</div>
    </div>
    <div class="stat-card approved">
      <div class="num" id="stat-approved">—</div>
      <div class="label">✅ 승인됨</div>
    </div>
    <div class="stat-card rejected">
      <div class="num" id="stat-rejected">—</div>
      <div class="label">❌ 거절됨</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pending',this)">⏳ 대기 중</button>
    <button class="tab-btn" onclick="switchTab('approved',this)">✅ 승인됨</button>
    <button class="tab-btn" onclick="switchTab('rejected',this)">❌ 거절됨</button>
    <button class="tab-btn" onclick="switchTab('notices',this)">📢 공지사항</button>
  </div>

  <div id="user-list" class="user-list"></div>

  <!-- 공지사항 관리 패널 -->
  <div id="notice-panel" style="display:none;">
    <div class="notice-form">
      <h3 id="notice-form-title">📝 새 공지사항 작성</h3>
      <input type="hidden" id="notice-edit-id">
      <input type="text" id="notice-title-input" placeholder="제목을 입력하세요">
      <textarea id="notice-content-input" placeholder="내용을 입력하세요 (규칙, 안내 등)"></textarea>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn-cancel-edit" id="notice-cancel-btn" style="display:none;" onclick="cancelEditNotice()">취소</button>
        <button class="btn-submit-notice" onclick="submitNotice()">등록</button>
      </div>
    </div>
    <div id="notice-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allUsers = [];
let currentTab = 'pending';
let allNotices = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function formatDate(str) {
  const d = new Date(str);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function loadUsers() {
  const res = await fetch('/api/admin/users');
  allUsers = await res.json();
  updateStats();
  renderTab(currentTab);
}

function updateStats() {
  document.getElementById('stat-pending').textContent  = allUsers.filter(u => u.status === 'pending').length;
  document.getElementById('stat-approved').textContent = allUsers.filter(u => u.status === 'approved').length;
  document.getElementById('stat-rejected').textContent = allUsers.filter(u => u.status === 'rejected').length;
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const noticePanel = document.getElementById('notice-panel');
  const userList    = document.getElementById('user-list');

  if (tab === 'notices') {
    userList.style.display   = 'none';
    noticePanel.style.display = 'block';
    loadNotices();
  } else {
    userList.style.display   = '';
    noticePanel.style.display = 'none';
    renderTab(tab);
  }
}

function renderTab(tab) {
  const filtered = allUsers.filter(u => u.status === tab);
  const list = document.getElementById('user-list');

  if (!filtered.length) {
    const labels = { pending: '대기 중인 가입 신청', approved: '승인된 사용자', rejected: '거절된 신청' };
    list.innerHTML = `
      <div class="empty-state">
        <div class="emoji">${tab === 'pending' ? '🕵️' : tab === 'approved' ? '👥' : '📭'}</div>
        <p>${labels[tab]}이 없어요</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(user => `
    <div class="user-card" id="user-${user.id}">
      <div class="avatar">${user.name[0]}</div>
      <div class="user-info">
        <div class="name">${user.name}</div>
        <div class="username">@${user.username}</div>
        <div class="date">가입 신청: ${formatDate(user.created_at)}</div>
      </div>
      <span class="status-badge ${user.status}">${
        { pending: '대기 중', approved: '승인됨', rejected: '거절됨' }[user.status]
      }</span>
      <div class="actions">
        ${tab === 'pending' ? `
          <button class="btn-approve" onclick="approveUser(${user.id})">✅ 승인</button>
          <button class="btn-reject"  onclick="rejectUser(${user.id})">❌ 거절</button>
        ` : tab === 'rejected' ? `
          <button class="btn-approve" onclick="approveUser(${user.id})">✅ 승인</button>
        ` : tab === 'approved' ? `
          <button class="btn-reject" onclick="rejectUser(${user.id})">❌ 승인 취소</button>
        ` : ''}
        <button class="btn-delete" onclick="deleteUser(${user.id}, '${user.name}')">🗑️</button>
      </div>
    </div>`).join('');
}

async function approveUser(id) {
  const res = await fetch(`/api/admin/users/${id}/approve`, { method: 'POST' });
  if ((await res.json()).success) {
    const user = allUsers.find(u => u.id === id);
    if (user) { user.status = 'approved'; updateStats(); renderTab(currentTab); }
    showToast('✅ 승인했어요!');
  }
}

async function rejectUser(id) {
  const res = await fetch(`/api/admin/users/${id}/reject`, { method: 'POST' });
  if ((await res.json()).success) {
    const user = allUsers.find(u => u.id === id);
    if (user) { user.status = 'rejected'; updateStats(); renderTab(currentTab); }
    showToast('❌ 거절했어요');
  }
}

async function deleteUser(id, name) {
  if (!confirm(`"${name}" 계정을 완전히 삭제할까요?`)) return;
  const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
  if ((await res.json()).success) {
    allUsers = allUsers.filter(u => u.id !== id);
    updateStats(); renderTab(currentTab);
    showToast('🗑️ 삭제됐어요');
  }
}

loadUsers();

// ════════════════════════════════════════
// 공지사항 관리
// ════════════════════════════════════════
function fmtDate(str) {
  const d = new Date(str);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadNotices() {
  const res = await fetch('/api/notices');
  allNotices = await res.json();
  renderNotices();
}

function renderNotices() {
  const list = document.getElementById('notice-list');
  if (!allNotices.length) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>등록된 공지사항이 없어요</p></div>';
    return;
  }
  list.innerHTML = allNotices.map(n => `
    <div class="notice-card" id="nc-${n.id}">
      <div class="notice-card-title">${escHtml(n.title)}</div>
      <div class="notice-card-meta">📅 ${fmtDate(n.created_at)}${n.updated_at !== n.created_at ? ' · 수정됨 ' + fmtDate(n.updated_at) : ''}</div>
      <div class="notice-card-content">${escHtml(n.content)}</div>
      <div class="actions">
        <button class="btn-edit-notice" onclick="startEditNotice(${n.id})">✏️ 수정</button>
        <button class="btn-del-notice"  onclick="deleteNotice(${n.id})">🗑️ 삭제</button>
      </div>
    </div>`).join('');
}

function startEditNotice(id) {
  const n = allNotices.find(x => x.id === id);
  if (!n) return;
  document.getElementById('notice-edit-id').value       = id;
  document.getElementById('notice-title-input').value   = n.title;
  document.getElementById('notice-content-input').value = n.content;
  document.getElementById('notice-form-title').textContent = '✏️ 공지사항 수정';
  document.getElementById('notice-cancel-btn').style.display = '';
  document.querySelector('.btn-submit-notice').textContent = '저장';
  document.getElementById('notice-title-input').focus();
  document.getElementById('notice-panel').scrollTop = 0;
  window.scrollTo({ top: document.getElementById('notice-panel').offsetTop - 80, behavior: 'smooth' });
}

function cancelEditNotice() {
  document.getElementById('notice-edit-id').value        = '';
  document.getElementById('notice-title-input').value    = '';
  document.getElementById('notice-content-input').value  = '';
  document.getElementById('notice-form-title').textContent = '📝 새 공지사항 작성';
  document.getElementById('notice-cancel-btn').style.display = 'none';
  document.querySelector('.btn-submit-notice').textContent = '등록';
}

async function submitNotice() {
  const id      = document.getElementById('notice-edit-id').value;
  const title   = document.getElementById('notice-title-input').value.trim();
  const content = document.getElementById('notice-content-input').value.trim();
  if (!title || !content) { showToast('⚠️ 제목과 내용을 모두 입력해주세요'); return; }

  const url    = id ? `/api/notices/${id}` : '/api/notices';
  const method = id ? 'PUT' : 'POST';
  const res    = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, content })
  });
  const data = await res.json();
  if (data.success) {
    showToast(id ? '✅ 공지사항이 수정됐어요' : '✅ 공지사항이 등록됐어요');
    cancelEditNotice();
    await loadNotices();
  } else {
    showToast('❌ ' + (data.message || '오류가 발생했어요'));
  }
}

async function deleteNotice(id) {
  if (!confirm('이 공지사항을 삭제할까요?')) return;
  const res  = await fetch(`/api/notices/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) {
    allNotices = allNotices.filter(n => n.id !== id);
    renderNotices();
    showToast('🗑️ 삭제됐어요');
  }
}
</script>
</body>
</html>
